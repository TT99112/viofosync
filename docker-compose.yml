services:
  viofosync:
    image: tt99112/viofosync:latest
    container_name: viofosync
    restart: unless-stopped

    # Run as your NAS user if you do not want root-owned recordings.
    # user: "1000:1000"

    volumes:
      # NAS recording destination.
      - /dashcam-recordings:/recordings:rw

      # Optional source for SD card / SSD / copied dashcam files.
      # - /path/to/mounted/dashcam-drive:/import:rw

    environment:
      # Wi-Fi sync. Leave empty when using IMPORT_SOURCE only.
      ADDRESS: ''

      TZ: Europe/London
      GROUPING: daily
      PRIORITY: date
      KEEP: 2w

      # Run interval in seconds when RUN_ONCE is not set.
      SYNC_INTERVAL: 600

      MAX_USED_DISK: 90
      TIMEOUT: 10
      DOWNLOAD_ATTEMPTS: 1
      VERBOSE: 0

      # Optional modes. Use 1 to enable; leave empty or use false/0 to disable.
      HTML: ''
      READ_ONLY: ''
      GPS_EXTRACT: ''
      DELETE_AFTER_SYNC: ''
      DRY_RUN: ''
      RUN_ONCE: ''

      # Local import mode.
      IMPORT_SOURCE: ''
      MOVE_IMPORTED: ''

      # Normal-driving chunk merging. Parking files are not merged.
      MERGE_CHUNKS: ''
      MERGE_GAP: 2
      MERGED_DESTINATION: ''
      DELETE_MERGED_SOURCES: ''
